<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avant-Garde Studio | Engine Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Playfair+Display:ital,wght@1,700&family=Roboto+Mono&family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            --paper: #f2ede4;
            --black: #1a1a1a;
            --red: #d32f2f;
            --yellow: #fbc02d;
            --blue: #1976d2;
            --dim-blue: #5c7080;
            --ui-bg: #ffffff;
            --tool-grey: #444;
        }

        body {
            margin: 0; padding: 0;
            display: flex; flex-direction: column;
            align-items: center; min-height: 100vh;
            background-color: #d1ccc0;
            font-family: 'Courier New', Courier, monospace;
            user-select: none; overflow: hidden;
        }

        .toolbar {
            width: 100%; background: var(--black); padding: 10px;
            display: flex; justify-content: center; gap: 15px;
            flex-wrap: wrap; z-index: 1000;
        }

        .tool-group { display: flex; align-items: center; gap: 8px; color: white; font-size: 12px; }

        button {
            padding: 5px 12px; background: var(--tool-grey); color: white;
            border: 1px solid #666; cursor: pointer; text-transform: uppercase;
            font-family: inherit; font-size: 11px; transition: background 0.2s;
        }

        button:hover { background: #555; }
        button.danger { background: #822; }
        button.info { background: var(--dim-blue); border-color: #4a5a66; }

        .canvas-container {
            flex-grow: 1; display: flex; justify-content: center;
            align-items: center; width: 100%; padding: 20px; box-sizing: border-box;
        }

        .canvas {
            position: relative; width: 80vw; height: 70vh;
            max-width: 800px; max-height: 600px;
            background-color: var(--paper);
            box-shadow: 20px 20px 60px rgba(0,0,0,0.2);
            overflow: hidden; border: 1px solid rgba(0,0,0,0.1);
        }

        .element { position: absolute; cursor: move; box-sizing: border-box; white-space: nowrap; will-change: transform, left, top; }
        .element.selected { outline: 2px dashed #000; outline-offset: 4px; z-index: 10; }

        /* Shape Styles */
        .shape-square { background: var(--black); }
        .shape-circle { border-radius: 50%; background: var(--red); }
        .shape-triangle {
            width: 0 !important; height: 0 !important; background: transparent !important;
            border-left: 50px solid transparent; border-right: 50px solid transparent;
            border-bottom: 100px solid var(--blue);
        }
        .shape-line { height: 2px; background: var(--black); }
        .shape-arrow { width: 100px; height: 2px; background: var(--black); }
        .shape-arrow::after {
            content: ''; position: absolute; right: -2px; top: 50%; transform: translateY(-50%);
            width: 0; height: 0; border-top: 6px solid transparent; border-bottom: 6px solid transparent;
            border-left: 10px solid currentColor;
        }

        /* Font Classes */
        .font-modern { font-family: 'Montserrat', sans-serif; text-transform: uppercase; }
        .font-classic { font-family: 'Playfair Display', serif; font-style: italic; }
        .font-neon { font-family: 'Dancing Script', cursive; text-shadow: 0 0 5px rgba(255,255,255,0.8); }
        .font-typewriter { font-family: 'Roboto Mono', monospace; }
        .font-strong { font-family: 'Arial Black', sans-serif; font-weight: 900; background: #000; color: #fff; padding: 2px 8px; }

        .properties-panel {
            position: fixed; right: 20px; top: 80px;
            background: var(--ui-bg); padding: 15px;
            border: 2px solid var(--black); box-shadow: 10px 10px 0px rgba(0,0,0,0.1);
            display: none; flex-direction: column; gap: 10px; width: 220px; z-index: 1001;
        }

        .prop-row { display: flex; flex-direction: column; gap: 4px; font-size: 11px; font-weight: bold; }
        input, select { padding: 4px; font-family: inherit; font-size: 12px; border: 1px solid #ccc; }

        .canvas::after {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://www.transparenttextures.com/patterns/paper-fibers.png');
            opacity: 0.3; pointer-events: none; z-index: 99;
        }
    </style>
</head>
<body>

    <div class="toolbar">
        <div class="tool-group">
            <span>ADD:</span>
            <button onclick="engine.addElement('square')">Square</button>
            <button onclick="engine.addElement('circle')">Circle</button>
            <button onclick="engine.addElement('triangle')">Triangle</button>
            <button onclick="engine.addElement('line')">Line</button>
            <button onclick="engine.addElement('arrow')">Arrow</button>
            <button onclick="engine.addElement('text')">+ Text</button>
        </div>
        <div class="tool-group">
            <span>CANVAS BG:</span>
            <input type="color" id="bg-color-picker" value="#f2ede4" oninput="engine.setBg(this.value)">
        </div>
        <div class="tool-group">
            <button class="info" onclick="engine.clear()">Clean Canvas</button>
        </div>
    </div>

    <div class="canvas-container" onmousedown="engine.deselectAll(event)">
        <div class="canvas" id="art-canvas"></div>
    </div>

    <div class="properties-panel" id="props-panel">
        <div id="panel-title" style="font-size: 14px; border-bottom: 1px solid #000; padding-bottom: 5px;">EDIT</div>
        
        <div class="prop-row" id="row-text-content">
            <label>Content</label>
            <input type="text" id="prop-text-input" oninput="engine.updateSelected('content', this.value)">
        </div>
        
        <div class="prop-row">
            <label>Color</label>
            <input type="color" id="prop-color" oninput="engine.updateSelected('color', this.value)">
        </div>

        <div class="prop-row" id="row-font-type">
            <label>Font Style</label>
            <select id="prop-font-family" onchange="engine.updateSelected('fontFamily', this.value)">
                <option value="font-modern">Modern</option>
                <option value="font-classic">Classic</option>
                <option value="font-neon">Neon</option>
                <option value="font-typewriter">Typewriter</option>
                <option value="font-strong">Strong</option>
            </select>
        </div>

        <div class="prop-row">
            <label id="label-size">Size</label>
            <input type="range" id="prop-size" min="5" max="600" oninput="engine.updateSelected('size', this.value)">
        </div>

        <div class="prop-row" id="row-thickness">
            <label>Thickness</label>
            <input type="range" id="prop-thickness" min="1" max="50" oninput="engine.updateSelected('thickness', this.value)">
        </div>

        <div class="prop-row">
            <label>Transparency</label>
            <input type="range" id="prop-opacity" min="0" max="100" oninput="engine.updateSelected('opacity', this.value / 100)">
        </div>

        <div class="prop-row">
            <label>Rotation</label>
            <input type="range" id="prop-rotation" min="0" max="360" oninput="engine.updateSelected('rotation', this.value)">
        </div>

        <div class="prop-row" style="margin-top: 10px; border-top: 1px solid #eee; padding-top: 10px;">
            <button class="danger" onclick="engine.deleteSelected()">Delete Element</button>
        </div>
    </div>

    <script>
        /**
         * BASE CLASS: ArtElement
         * Represents the logic for any item on the canvas.
         */
        class ArtElement {
            constructor(data = {}) {
                this.id = data.id || crypto.randomUUID();
                this.type = data.type || 'square';
                this.x = data.x || 100;
                this.y = data.y || 100;
                this.vx = data.vx || 0; // Velocity X (for future physics)
                this.vy = data.vy || 0; // Velocity Y (for future physics)
                this.mass = data.mass || 1;
                this.rotation = data.rotation || 0;
                this.size = data.size || 100;
                this.color = data.color || '#1a1a1a';
                this.opacity = data.opacity !== undefined ? data.opacity : 1;
                this.thickness = data.thickness || 2;
                this.domElement = null;
            }

            update(dt) {
                // Future physics logic: this.x += this.vx * dt;
            }

            // Method for serialization
            serialize() {
                const { domElement, ...data } = this;
                return data;
            }
        }

        class ShapeElement extends ArtElement {}

        class TextElement extends ArtElement {
            constructor(data = {}) {
                super(data);
                this.type = 'text';
                this.content = data.content || 'NEW TEXT';
                this.fontFamily = data.fontFamily || 'font-modern';
            }
        }

        /**
         * THE ENGINE (MVC Controller)
         * Manages the State, the Loop, and the DOM Synchronization.
         */
        class ArtEngine {
            constructor() {
                this.elements = [];
                this.selectedId = null;
                this.canvas = document.getElementById('art-canvas');
                this.propsPanel = document.getElementById('props-panel');
                
                // Dragging state
                this.isDragging = false;
                this.dragStart = { x: 0, y: 0, elementX: 0, elementY: 0 };

                this.init();
            }

            init() {
                // Start Game Loop
                requestAnimationFrame((t) => this.tick(t));

                // Global Mouse Events for Dragging
                window.addEventListener('mousemove', (e) => this.handleMouseMove(e));
                window.addEventListener('mouseup', () => { this.isDragging = false; });

                // Initial demo elements
                this.addElement('square', { x: 50, y: 50, rotation: -10 });
                this.addElement('text', { x: 150, y: 200, content: 'EVOLUTION', color: '#d32f2f', size: 40 });
            }

            addElement(type, data = {}) {
                let el;
                if (type === 'text') {
                    el = new TextElement(data);
                } else {
                    el = new ShapeElement({ ...data, type });
                }
                this.elements.push(el);
                this.renderInitial(el);
                this.selectElement(el.id);
            }

            // First time creation of DOM node
            renderInitial(el) {
                const div = document.createElement('div');
                div.id = el.id;
                div.className = el.type === 'text' ? 'element text-element' : `element shape shape-${el.type}`;
                
                div.addEventListener('mousedown', (e) => {
                    e.stopPropagation();
                    this.selectElement(el.id);
                    this.isDragging = true;
                    this.dragStart = {
                        x: e.clientX,
                        y: e.clientY,
                        elementX: el.x,
                        elementY: el.y
                    };
                });

                el.domElement = div;
                this.canvas.appendChild(div);
            }

            tick(timestamp) {
                // Update State
                this.elements.forEach(el => el.update(16/1000));

                // Synchronize View
                this.elements.forEach(el => this.syncDOM(el));

                requestAnimationFrame((t) => this.tick(t));
            }

            syncDOM(el) {
                const dom = el.domElement;
                if (!dom) return;

                // Position and Rotation
                dom.style.transform = `translate(${el.x}px, ${el.y}px) rotate(${el.rotation}deg)`;
                dom.style.opacity = el.opacity;
                
                // Class-specific styling
                if (el.type === 'text') {
                    dom.innerText = el.content;
                    dom.style.color = el.color;
                    dom.style.fontSize = `${el.size}px`;
                    dom.className = `element text-element ${el.fontFamily} ${this.selectedId === el.id ? 'selected' : ''}`;
                } else if (el.type === 'triangle') {
                    dom.style.borderLeftWidth = `${el.size/2}px`;
                    dom.style.borderRightWidth = `${el.size/2}px`;
                    dom.style.borderBottomWidth = `${el.size}px`;
                    dom.style.borderBottomColor = el.color;
                    dom.className = `element shape shape-triangle ${this.selectedId === el.id ? 'selected' : ''}`;
                } else {
                    dom.style.width = `${el.size}px`;
                    dom.style.height = (el.type === 'line' || el.type === 'arrow') ? `${el.thickness}px` : `${el.size}px`;
                    dom.style.backgroundColor = el.color;
                    if (el.type === 'arrow') dom.style.color = el.color;
                    dom.className = `element shape shape-${el.type} ${this.selectedId === el.id ? 'selected' : ''}`;
                }
            }

            handleMouseMove(e) {
                if (!this.isDragging || !this.selectedId) return;
                const el = this.elements.find(i => i.id === this.selectedId);
                if (el) {
                    el.x = this.dragStart.elementX + (e.clientX - this.dragStart.x);
                    el.y = this.dragStart.elementY + (e.clientY - this.dragStart.y);
                }
            }

            selectElement(id) {
                this.selectedId = id;
                const el = this.elements.find(i => i.id === id);
                if (!el) return;

                this.propsPanel.style.display = 'flex';
                
                // Update Inputs to match state
                document.getElementById('row-text-content').style.display = el.type === 'text' ? 'flex' : 'none';
                document.getElementById('row-font-type').style.display = el.type === 'text' ? 'flex' : 'none';
                document.getElementById('row-thickness').style.display = (el.type === 'line' || el.type === 'arrow') ? 'flex' : 'none';

                if (el.type === 'text') document.getElementById('prop-text-input').value = el.content;
                document.getElementById('prop-color').value = el.color;
                document.getElementById('prop-size').value = el.size;
                document.getElementById('prop-opacity').value = el.opacity * 100;
                document.getElementById('prop-rotation').value = el.rotation;
                if (el.thickness) document.getElementById('prop-thickness').value = el.thickness;
            }

            updateSelected(prop, value) {
                const el = this.elements.find(i => i.id === this.selectedId);
                if (el) el[prop] = value;
            }

            deleteSelected() {
                const idx = this.elements.findIndex(i => i.id === this.selectedId);
                if (idx !== -1) {
                    this.elements[idx].domElement.remove();
                    this.elements.splice(idx, 1);
                    this.deselectAll();
                }
            }

            deselectAll(e) {
                if (!e || e.target.id === 'art-canvas' || e.target.classList.contains('canvas-container')) {
                    this.selectedId = null;
                    this.propsPanel.style.display = 'none';
                }
            }

            clear() {
                this.elements.forEach(el => el.domElement.remove());
                this.elements = [];
                this.deselectAll();
            }

            setBg(color) { this.canvas.style.backgroundColor = color; }

            // Serialization methods
            toJSON() {
                return JSON.stringify({
                    bg: this.canvas.style.backgroundColor,
                    elements: this.elements.map(el => el.serialize())
                });
            }

            fromJSON(jsonStr) {
                this.clear();
                const data = JSON.parse(jsonStr);
                this.setBg(data.bg);
                data.elements.forEach(elData => {
                    this.addElement(elData.type, elData);
                });
            }
        }

        // Initialize Global Engine
        const engine = new ArtEngine();

    </script>
</body>
</html>
