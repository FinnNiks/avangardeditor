<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avant-Garde Studio | SVG Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Playfair+Display:ital,wght@1,700&family=Roboto+Mono&family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            --paper: #f2ede4;
            --black: #1a1a1a;
            --red: #d32f2f;
            --yellow: #fbc02d;
            --blue: #1976d2;
            --ui-bg: #ffffff;
            --tool-grey: #444;
        }

        body {
            margin: 0; padding: 0;
            display: flex; flex-direction: column;
            align-items: center; min-height: 100vh;
            background-color: #d1ccc0;
            font-family: 'Courier New', Courier, monospace;
            user-select: none; overflow: hidden;
        }

        .toolbar {
            width: 100%; background: var(--black); padding: 10px;
            display: flex; justify-content: center; gap: 15px;
            flex-wrap: wrap; z-index: 1000;
        }

        .tool-group { display: flex; align-items: center; gap: 8px; color: white; font-size: 12px; }

        button, select.ui-select {
            padding: 5px 12px; background: var(--tool-grey); color: white;
            border: 1px solid #666; cursor: pointer; text-transform: uppercase;
            font-family: inherit; font-size: 11px; transition: background 0.2s;
            outline: none;
        }

        button:hover, select.ui-select:hover { background: #555; }
        button.danger { background: #822; }

        .canvas-container {
            flex-grow: 1; display: flex; justify-content: center;
            align-items: center; width: 100%; padding: 40px; box-sizing: border-box;
            position: relative;
        }

        .canvas-wrapper {
            position: relative;
            box-shadow: 20px 20px 60px rgba(0,0,0,0.2);
            background-color: var(--paper);
            transition: width 0.3s ease-out, height 0.3s ease-out;
        }
        
        .canvas-wrapper.no-transition {
            transition: none !important;
        }

        #art-canvas {
            width: 600px; 
            height: 450px; 
            display: block;
            border: 1px solid rgba(0,0,0,0.1);
            cursor: crosshair;
        }

        .resize-trigger {
            position: absolute;
            right: 0;
            bottom: 0;
            width: 20px;
            height: 20px;
            background: transparent;
            cursor: nwse-resize;
            z-index: 10;
        }

        .element-group { cursor: move; pointer-events: all; }
        .element-group.selected .selection-overlay {
            stroke: #000;
            stroke-width: 1;
            stroke-dasharray: 4, 4;
            fill: none;
            display: block;
        }
        .selection-overlay { display: none; }
        .hitbox { fill: transparent; stroke: transparent; cursor: move; }

        .font-modern { font-family: 'Montserrat', sans-serif; font-weight: 900; text-transform: uppercase; }
        .font-classic { font-family: 'Playfair Display', serif; font-style: italic; }
        .font-neon { font-family: 'Dancing Script', cursive; }
        .font-typewriter { font-family: 'Roboto Mono', monospace; }
        .font-strong { font-family: 'Arial Black', sans-serif; font-weight: 900; }

        .properties-panel {
            position: fixed; right: 20px; top: 80px;
            background: var(--ui-bg); padding: 15px;
            border: 2px solid var(--black); box-shadow: 10px 10px 0px rgba(0,0,0,0.1);
            display: none; flex-direction: column; gap: 10px; width: 220px; z-index: 1001;
        }

        .prop-row { display: flex; flex-direction: column; gap: 4px; font-size: 11px; font-weight: bold; }
        input, select { padding: 4px; font-family: inherit; font-size: 12px; border: 1px solid #ccc; }
    </style>
</head>
<body>

    <div class="toolbar">
        <div class="tool-group">
            <span>ADD:</span>
            <button onclick="engine.addElement('square')">Square</button>
            <button onclick="engine.addElement('circle')">Circle</button>
            <button onclick="engine.addElement('triangle')">Triangle</button>
            <button onclick="engine.addElement('line')">Line</button>
            <button onclick="engine.addElement('arrow')">Arrow</button>
            <button onclick="engine.addElement('text')">+ Text</button>
        </div>
        <div class="tool-group">
            <span>CANVAS:</span>
            <input type="color" id="bg-color-picker" value="#f2ede4" oninput="engine.setBg(this.value)">
        </div>
        <div class="tool-group">
            <select class="ui-select" id="ratio-selector" onchange="engine.setAspectRatio(this.value)">
                <option value="1.333">4:3</option>
                <option value="1">1:1</option>
                <option value="1.777">16:9</option>
                <option value="1.5">3:2</option>
                <option value="0.75">3:4</option>
            </select>
        </div>
        <div class="tool-group">
            <button onclick="engine.clear()">Clean</button>
        </div>
    </div>

    <div class="canvas-container" onmousedown="engine.deselectAll(event)">
        <div class="canvas-wrapper" id="canvas-wrapper">
            <svg id="art-canvas" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid meet">
                <defs>
                    <pattern id="paper-texture" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
                        <image href="https://www.transparenttextures.com/patterns/paper-fibers.png" x="0" y="0" width="100" height="100" opacity="0.3" />
                    </pattern>
                </defs>
                <rect id="canvas-bg-rect" width="100%" height="100%" fill="#f2ede4" />
                <rect width="100%" height="100%" fill="url(#paper-texture)" pointer-events="none" />
                <g id="elements-layer"></g>
            </svg>
            <div class="resize-trigger" id="resize-handle"></div>
        </div>
    </div>

    <div class="properties-panel" id="props-panel">
        <div style="font-size: 14px; border-bottom: 1px solid #000; padding-bottom: 5px;">EDIT</div>
        <div class="prop-row" id="row-text-content"><label>Content</label><input type="text" id="prop-text-input" oninput="engine.updateSelected('content', this.value)"></div>
        <div class="prop-row"><label>Color</label><input type="color" id="prop-color" oninput="engine.updateSelected('color', this.value)"></div>
        <div class="prop-row" id="row-font-type">
            <label>Font Style</label>
            <select id="prop-font-family" onchange="engine.updateSelected('fontFamily', this.value)">
                <option value="font-modern">Modern</option>
                <option value="font-classic">Classic</option>
                <option value="font-neon">Neon</option>
                <option value="font-typewriter">Typewriter</option>
                <option value="font-strong">Strong</option>
            </select>
        </div>
        <div class="prop-row"><label>Size</label><input type="range" id="prop-size" min="5" max="600" oninput="engine.updateSelected('size', this.value)"></div>
        <div class="prop-row" id="row-thickness"><label>Thickness</label><input type="range" id="prop-thickness" min="1" max="50" oninput="engine.updateSelected('thickness', this.value)"></div>
        <div class="prop-row"><label>Opacity</label><input type="range" id="prop-opacity" min="0" max="100" oninput="engine.updateSelected('opacity', this.value / 100)"></div>
        <div class="prop-row"><label>Rotation</label><input type="range" id="prop-rotation" min="0" max="360" oninput="engine.updateSelected('rotation', this.value)"></div>
        <div class="prop-row" style="margin-top: 10px; border-top: 1px solid #eee; padding-top: 10px;"><button class="danger" onclick="engine.deleteSelected()">Delete</button></div>
    </div>

    <script>
        const SVG_NS = "http://www.w3.org/2000/svg";

        class ArtElement {
            constructor(data = {}) {
                this.id = data.id || crypto.randomUUID();
                this.type = data.type || 'square';
                this.x = data.x !== undefined ? parseFloat(data.x) : 0;
                this.y = data.y !== undefined ? parseFloat(data.y) : 0;
                this.rotation = parseFloat(data.rotation) || 0;
                this.size = parseFloat(data.size) || 100;
                this.color = data.color || '#1a1a1a';
                this.opacity = data.opacity !== undefined ? parseFloat(data.opacity) : 1;
                this.thickness = parseFloat(data.thickness) || 2;
                this.domGroup = null;
            }
        }

        class ArtEngine {
            constructor() {
                this.elements = [];
                this.selectedId = null;
                this.canvas = document.getElementById('art-canvas');
                this.wrapper = document.getElementById('canvas-wrapper');
                this.canvasBgRect = document.getElementById('canvas-bg-rect');
                this.layer = document.getElementById('elements-layer');
                this.propsPanel = document.getElementById('props-panel');
                
                this.bgColor = "#f2ede4";
                this.currentRatio = 1.333; 
                
                this.isDragging = false;
                this.isResizing = false;
                this.dragStart = { x: 0, y: 0, elementX: 0, elementY: 0 };
                this.resizeStart = { x: 0, y: 0, width: 0, height: 0 };

                this.init();
            }

            init() {
                requestAnimationFrame(() => this.tick());
                
                window.addEventListener('mousemove', (e) => this.handleMouseMove(e));
                window.addEventListener('mouseup', () => { 
                    this.isDragging = false; 
                    this.isResizing = false; 
                    this.wrapper.classList.remove('no-transition');
                });

                const handle = document.getElementById('resize-handle');
                handle.addEventListener('mousedown', (e) => {
                    e.stopPropagation();
                    this.isResizing = true;
                    this.wrapper.classList.add('no-transition');
                    this.resizeStart = {
                        x: e.clientX,
                        y: e.clientY,
                        width: this.canvas.clientWidth,
                        height: this.canvas.clientHeight
                    };
                });

                // --- STARTUP RANDOM PICTURE ---
                const texts = ["REVOLUTION", "WE ALL SHALL BE", "ELEVATION", "REBEL", "AVANGARD", "ЧАШНИК", "КАНДИНСКИЙ", "КАЗЕМИР", "ВПЕРЁД!", "КОСМОС", "УДАР ИЗ КОСМОСА", "SUPREMATISM"];
                
                // 1. Random Triangle
                this.addElement('triangle', { size: Math.random() * 200 + 50 });
                // 2. Random Square
                this.addElement('square', { size: Math.random() * 200 + 50 });
                // 3. Random Circle
                this.addElement('circle', { size: Math.random() * 200 + 50 });
                // 4. Random Arrow
                this.addElement('arrow', { size: Math.random() * 300 + 100, thickness: Math.random() * 10 + 2 });
                // 5. Random Text
                this.addElement('text', { 
                    content: texts[Math.floor(Math.random() * texts.length)],
                    size: Math.random() * 60 + 30,
                    fontFamily: 'font-modern'
                });

                this.deselectAll(); // Clean selection UI on start
            }

            setAspectRatio(val) {
                this.currentRatio = parseFloat(val);
                const currentWidth = this.canvas.clientWidth;
                const newHeight = currentWidth / this.currentRatio;
                this.canvas.style.height = `${newHeight}px`;
            }

            getRandomDistinctColor() {
                const colors = ['#d32f2f', '#fbc02d', '#1976d2', '#1a1a1a', '#388e3c', '#7b1fa2', '#e64a19'];
                return colors[Math.floor(Math.random() * colors.length)];
            }

            addElement(type, data = {}) {
                // ViewBox is 800x600. Keep shapes mostly inside.
                const randomX = data.x !== undefined ? data.x : Math.random() * 600 + 50;
                const randomY = data.y !== undefined ? data.y : Math.random() * 450 + 50;
                const randomRot = Math.random() * 360;

                const color = data.color || this.getRandomDistinctColor();
                const el = new ArtElement({ 
                    x: randomX, 
                    y: randomY, 
                    rotation: randomRot,
                    ...data, 
                    color, 
                    type 
                });

                if (type === 'text') {
                    el.content = data.content || 'NEW TEXT';
                    el.fontFamily = data.fontFamily || 'font-modern';
                }
                this.elements.push(el);
                this.renderInitial(el);
                this.selectElement(el.id);
            }

            renderInitial(el) {
                const g = document.createElementNS(SVG_NS, "g");
                g.setAttribute("id", el.id);
                g.classList.add("element-group");

                const overlay = document.createElementNS(SVG_NS, "rect");
                overlay.classList.add("selection-overlay");
                g.appendChild(overlay);

                const node = document.createElementNS(SVG_NS, 
                    el.type === 'square' ? 'rect' : 
                    el.type === 'circle' ? 'circle' : 
                    el.type === 'triangle' ? 'polygon' : 
                    el.type === 'text' ? 'text' : 'path'
                );
                node.classList.add("visual-node");
                g.appendChild(node);

                if (el.type === 'line' || el.type === 'arrow') {
                    const hitbox = document.createElementNS(SVG_NS, "path");
                    hitbox.classList.add("hitbox");
                    g.insertBefore(hitbox, node);
                    if (el.type === 'arrow') {
                        const head = document.createElementNS(SVG_NS, "polygon");
                        head.classList.add("visual-node", "head");
                        g.appendChild(head);
                    }
                }

                g.addEventListener('mousedown', (e) => {
                    e.stopPropagation();
                    this.selectElement(el.id);
                    this.isDragging = true;
                    const pt = this.getSVGPoint(e);
                    this.dragStart = { x: pt.x, y: pt.y, elementX: el.x, elementY: el.y };
                });

                el.domGroup = g;
                this.layer.appendChild(g);
            }

            getSVGPoint(e) {
                const p = this.canvas.createSVGPoint();
                p.x = e.clientX; p.y = e.clientY;
                return p.matrixTransform(this.canvas.getScreenCTM().inverse());
            }

            handleMouseMove(e) {
                if (this.isResizing) {
                    const deltaX = e.clientX - this.resizeStart.x;
                    const newWidth = Math.max(200, this.resizeStart.width + deltaX);
                    const newHeight = newWidth / this.currentRatio; 
                    this.canvas.style.width = `${newWidth}px`;
                    this.canvas.style.height = `${newHeight}px`;
                    return;
                }

                if (this.isDragging && this.selectedId) {
                    const el = this.elements.find(i => i.id === this.selectedId);
                    if (el) {
                        const pt = this.getSVGPoint(e);
                        el.x = this.dragStart.elementX + (pt.x - this.dragStart.x);
                        el.y = this.dragStart.elementY + (pt.y - this.dragStart.y);
                    }
                }
            }

            tick() {
                this.elements.forEach(el => this.syncDOM(el));
                requestAnimationFrame(() => this.tick());
            }

            syncDOM(el) {
                const g = el.domGroup;
                if (!g) return;
                const node = g.querySelector(".visual-node");
                const overlay = g.querySelector(".selection-overlay");
                let cx = 0, cy = 0;

                if (['square', 'circle', 'triangle'].includes(el.type)) {
                    cx = el.size / 2; cy = el.size / 2;
                } else if (el.type === 'text') {
                    const bbox = node.getBBox();
                    cx = bbox.x + bbox.width / 2; cy = bbox.y + bbox.height / 2;
                } else {
                    cx = el.size / 2; cy = el.thickness;
                }

                g.setAttribute("transform", `translate(${el.x}, ${el.y}) rotate(${el.rotation}, ${cx}, ${cy})`);
                g.style.opacity = el.opacity;
                g.classList.toggle("selected", this.selectedId === el.id);

                if (el.type === 'square') {
                    node.setAttribute("width", el.size); node.setAttribute("height", el.size);
                    node.setAttribute("fill", el.color);
                    this.setOverlay(overlay, 0, 0, el.size, el.size);
                } else if (el.type === 'circle') {
                    node.setAttribute("cx", el.size/2); node.setAttribute("cy", el.size/2);
                    node.setAttribute("r", el.size/2); node.setAttribute("fill", el.color);
                    this.setOverlay(overlay, 0, 0, el.size, el.size);
                } else if (el.type === 'triangle') {
                    node.setAttribute("points", `${el.size/2},0 ${el.size},${el.size} 0,${el.size}`);
                    node.setAttribute("fill", el.color);
                    this.setOverlay(overlay, 0, 0, el.size, el.size);
                } else if (el.type === 'text') {
                    node.textContent = el.content; node.setAttribute("fill", el.color);
                    node.setAttribute("font-size", el.size); node.setAttribute("y", el.size);
                    node.setAttribute("class", `visual-node ${el.fontFamily}`);
                    const bbox = node.getBBox();
                    this.setOverlay(overlay, bbox.x, bbox.y, bbox.width, bbox.height);
                } else {
                    const hW = el.type === 'arrow' ? el.thickness * 4 : 0;
                    const lY = hW || el.thickness;
                    node.setAttribute("d", `M 0,${lY} L ${el.size - (el.type === 'arrow' ? el.thickness * 5 : 0)},${lY}`);
                    node.setAttribute("stroke", el.color); node.setAttribute("stroke-width", el.thickness);
                    if (el.type === 'arrow') {
                        const head = g.querySelector(".head");
                        const tL = el.size - el.thickness * 5;
                        head.setAttribute("points", `${tL},${lY-hW} ${el.size},${lY} ${tL},${lY+hW}`);
                        head.setAttribute("fill", el.color);
                    }
                    this.setOverlay(overlay, 0, lY - (hW || el.thickness), el.size, (hW * 2) || el.thickness * 2);
                }
            }

            setOverlay(ov, x, y, w, h) {
                ov.setAttribute("x", x - 5); ov.setAttribute("y", y - 5);
                ov.setAttribute("width", w + 10); ov.setAttribute("height", h + 10);
            }

            selectElement(id) {
                this.selectedId = id;
                const el = this.elements.find(i => i.id === id);
                if (!el) return;
                this.propsPanel.style.display = 'flex';
                document.getElementById('row-text-content').style.display = el.type === 'text' ? 'flex' : 'none';
                document.getElementById('row-font-type').style.display = el.type === 'text' ? 'flex' : 'none';
                document.getElementById('row-thickness').style.display = ['line', 'arrow'].includes(el.type) ? 'flex' : 'none';
                document.getElementById('prop-color').value = el.color;
                document.getElementById('prop-size').value = el.size;
                document.getElementById('prop-opacity').value = el.opacity * 100;
                document.getElementById('prop-rotation').value = el.rotation;
                if (el.type === 'text') {
                    document.getElementById('prop-text-input').value = el.content;
                    document.getElementById('prop-font-family').value = el.fontFamily;
                }
            }

            updateSelected(prop, val) {
                const el = this.elements.find(i => i.id === this.selectedId);
                if (el) el[prop] = isNaN(val) || ['color', 'content', 'fontFamily'].includes(prop) ? val : parseFloat(val);
            }

            deleteSelected() {
                const idx = this.elements.findIndex(i => i.id === this.selectedId);
                if (idx !== -1) { this.elements[idx].domGroup.remove(); this.elements.splice(idx, 1); this.deselectAll(); }
            }

            deselectAll(e) {
                if (!e || ['art-canvas', 'canvas-bg-rect', 'canvas-wrapper'].includes(e.target.id)) {
                    this.selectedId = null; this.propsPanel.style.display = 'none';
                }
            }

            clear() { this.elements.forEach(el => el.domGroup.remove()); this.elements = []; this.deselectAll(); }

            setBg(color) { 
                this.bgColor = color;
                this.wrapper.style.backgroundColor = color;
                this.canvasBgRect.setAttribute('fill', color);
            }
        }
        const engine = new ArtEngine();
    </script>
</body>
</html>
